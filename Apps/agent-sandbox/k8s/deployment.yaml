apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-sandbox-demo
  namespace: agent-sandbox-snapshots
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-sandbox-demo
  namespace: agent-sandbox-snapshots
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: ["agents.x-k8s.io"]
  resources: ["sandboxes"]
  verbs: ["get", "list", "watch", "patch"]
- apiGroups: ["extensions.agents.x-k8s.io"]
  resources: ["sandboxclaims"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: ["podsnapshot.gke.io"]
  resources: ["podsnapshots"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["podsnapshot.gke.io"]
  resources: ["podsnapshotmanualtriggers"]
  verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-sandbox-demo
  namespace: agent-sandbox-snapshots
subjects:
- kind: ServiceAccount
  name: agent-sandbox-demo
  namespace: agent-sandbox-snapshots
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-sandbox-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-sandbox-demo
  namespace: agent-sandbox-snapshots
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-sandbox-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-sandbox-demo
    spec:
      serviceAccountName: agent-sandbox-demo
      automountServiceAccountToken: true
      containers:
      - name: app
        image: asia-southeast1-docker.pkg.dev/new-demo-project-462517/demo/agent-sandbox-demo:latest
        imagePullPolicy: Always
        env:
        - name: SANDBOX_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SANDBOX_TEMPLATE
          value: snapshot-python
        - name: SANDBOX_WARM_POOL
          value: snapshot-python
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet: {path: /healthz, port: http}
          periodSeconds: 5
        livenessProbe:
          httpGet: {path: /healthz, port: http}
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits: {cpu: 250m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-sandbox-demo
  namespace: agent-sandbox-snapshots
spec:
  selector:
    app.kubernetes.io/name: agent-sandbox-demo
  ports:
  - name: http
    port: 8080
    targetPort: http
